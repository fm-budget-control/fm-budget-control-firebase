sonar.organization=fm-budget-control
sonar.projectKey=fm-budget-control_fm-budget-control-firebase

# ── Source layout ─────────────────────────────────────────────────────────────
sonar.sources=functions/src
sonar.tests=functions/src
sonar.test.inclusions=**/*.spec.ts

sonar.exclusions=\
  functions/dist/**,\
  functions/lib/**,\
  functions/node_modules/**,\
  functions/coverage/**,\
  functions/jest.config.ts

# ── TypeScript ────────────────────────────────────────────────────────────────
sonar.typescript.tsconfigPath=functions/tsconfig.json

# ── Coverage ──────────────────────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=functions/coverage/lcov.info

sonar.coverage.exclusions=\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/index.ts
