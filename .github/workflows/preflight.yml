name: Pre-flight

run-name: "Pre-flight — ${{ github.ref_name }} — ${{ github.actor }}"

on:
  push:
    branches:
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality Gate
    uses: ./.github/workflows/quality-gate.yml
    with:
      skip_sonar: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
